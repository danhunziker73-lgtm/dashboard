<!DOCTYPE html>
<html>
<head><title>Sonos Play Debug</title></head>
<body style="background:#111;color:#fff;font-family:monospace;padding:20px;">
<h2>Sonos Play Debug</h2>
<div id="log" style="white-space:pre-wrap;background:#000;padding:12px;border-radius:8px;font-size:13px;margin-top:12px;"></div>
<script>
const log = (...args) => {
  const el = document.getElementById('log');
  el.textContent += args.join(' ') + '\n';
  console.log(...args);
};

async function runTests() {
  // 1. Read config from localStorage
  const sonosIp = localStorage.getItem('active_sonos_ip');
  const ndUrl = localStorage.getItem('navidrome_url');
  const ndUser = localStorage.getItem('navidrome_user');
  const ndPass = localStorage.getItem('navidrome_pass');
  
  log('=== CONFIG ===');
  log('Sonos IP:', sonosIp || '(leer - kein Gerät gewählt!)');
  log('Navidrome URL:', ndUrl || '(leer)');
  log('Navidrome User:', ndUser || '(leer)');
  log('Navidrome Pass:', ndPass ? '***' : '(leer)');
  log('');

  // 2. Test Sonos state
  log('=== SONOS STATE TEST ===');
  try {
    const r = await fetch('/api/sonos/state_all');
    const data = await r.json();
    log('Sonos Geräte:', JSON.stringify(data.map(d => ({name:d.name, ip:d.ip, state:d.state})), null, 2));
  } catch(e) {
    log('FEHLER:', e.message);
  }
  log('');

  // 3. Test Navidrome API
  if (ndUrl && ndUser) {
    log('=== NAVIDROME TEST ===');
    function encPass(p) { let h=''; for(let i=0;i<p.length;i++) h+=p.charCodeAt(i).toString(16); return 'enc:'+h; }
    const params = new URLSearchParams({ u: ndUser, p: encPass(ndPass||''), v:'1.16.1', c:'debug', f:'json' });
    try {
      const r = await fetch(`${ndUrl}/rest/ping.view?${params}`);
      const data = await r.json();
      log('Navidrome ping:', JSON.stringify(data['subsonic-response']?.status));
    } catch(e) {
      log('FEHLER:', e.message);
    }

    // Get one track ID to test
    try {
      const r2 = await fetch(`${ndUrl}/rest/getAlbumList2.view?${params}&type=newest&size=1`);
      const d2 = await r2.json();
      const alb = d2['subsonic-response']?.albumList2?.album?.[0];
      if (alb) {
        log('Test Album:', alb.name, 'ID:', alb.id);
        const r3 = await fetch(`${ndUrl}/rest/getAlbum.view?${params}&id=${alb.id}`);
        const d3 = await r3.json();
        const song = d3['subsonic-response']?.album?.song?.[0];
        if (song) {
          log('Test Song:', song.title, 'ID:', song.id);
          
          // Build proxy URL (same as navidrome.js does it)
          const directUrl = new URL(`${ndUrl}/rest/stream.view`);
          const sp = new URLSearchParams({ u: ndUser, p: encPass(ndPass||''), v:'1.16.1', c:'antigravity-dashboard', id: song.id });
          const directStr = `${directUrl}?${sp}`;
          const proxyUrl = `/api/audio/stream?url=${encodeURIComponent(directStr)}`;
          log('');
          log('=== PROXY STREAM TEST ===');
          log('Direct URL:', directStr.substring(0, 80) + '...');
          log('Proxy URL:', proxyUrl.substring(0, 80) + '...');
          
          // Test proxy with HEAD
          try {
            const ph = await fetch(proxyUrl, {method:'HEAD'});
            log('Proxy HEAD status:', ph.status);
            log('Content-Type:', ph.headers.get('Content-Type'));
          } catch(e) {
            log('Proxy HEAD FEHLER:', e.message);
          }
          
          // Test play_uri
          if (sonosIp) {
            log('');
            log('=== PLAY_URI TEST ===');
            log('Sending play_uri to Sonos...');
            try {
              const pr = await fetch('/api/sonos/control', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ ip: sonosIp, action:'play_uri', value: proxyUrl })
              });
              const pd = await pr.json();
              log('Result:', JSON.stringify(pd));
            } catch(e) {
              log('play_uri FEHLER:', e.message);
            }
          } else {
            log('KEIN SONOS-IP! Kann play_uri nicht testen.');
          }
        }
      }
    } catch(e) {
      log('FEHLER beim Album-Test:', e.message);
    }
  } else {
    log('Navidrome nicht konfiguriert - Tests übersprungen.');
  }
  
  log('\n=== FERTIG ===');
}

runTests();
</script>
</body>
</html>
